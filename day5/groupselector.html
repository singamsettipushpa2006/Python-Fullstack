<!doctype html>
<html lang="en">
  <head>
    <title>selectors</title>
    <style>
      h1 ~ p {
        color: red;
      }

      h1 + p {
        color: blue;
      }

      #p2,
      #p3 {
        color: green;
      }
    </style>
  </head>
  <body>
    <h1>This is Unit</h1>
    <p>this is para1</p>
    <p id="p2">this is para2</p>
    <p id="p3">thia is para3</p>
    <p>this is para4</p>
  </body>
</html>
