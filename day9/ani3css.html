<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      .box {
        background-color: rgb(22, 235, 22);
        border: 5px solid black;
        height: 300px;
        width: 300px;
      }
      .box:hover {
        background-color: blue;
        border-radius: 100%;
        transition-duration: 5s;
        transform: rotateX(360deg);
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
  </body>
</html>
