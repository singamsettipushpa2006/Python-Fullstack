<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      img {
        animation: load {
          width: 500px;
          height: auto;
        }
        from {
          opecity: 0;
          transform: translatex(-500px);
        }
        to {
          opecity: 1;
          transform: translatex(100px);
        }
      }
      h1 {
        color: blue;
        text-align: center;
        animation-delay: 5s;
        animation-fill-mode: forwards;
      }
    </style>
  </head>
  <body>
    <img src="natureimg.jfif" alt="error" />
    <h1>NATURE</h1>
  </body>
</html>
