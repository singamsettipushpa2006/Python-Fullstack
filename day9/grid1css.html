<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      .parent {
        border: 5px solid black;
        padding: 10px;
        gap: 10px;
        display: grid;
        width: 600px;
        height: 400px;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
      }
      .parent > div {
        background-color: blue;
      }
      .parent > .child1 {
        grid-row: span 2;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1"></div>
      <div class="child2"></div>
      <div class="child3"></div>
    </div>
  </body>
</html>
