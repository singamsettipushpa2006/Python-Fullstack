<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      .parent {
        width: 400px;
        height: 400px;
        border: 5px solid black;
        background-color: chartreuse;
        position: relative;
      }
      .child {
        width: 30%;
        height: 30%;
        border: 3px solid black;
        background-color: white;
        position: absolute;
        right: 0px;
        top: 0px;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child"></div>
    </div>
  </body>
</html>
