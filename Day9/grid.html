<html>
  <head>
    <title>Grid</title>
    <style>
      div {
        border: 3px dashed yellow;
      }
      .parent {
        width: 500px;
        height: 500px;
        display: grid;
        grid-template-columns: 2fr 3fr 1fr;
        grid-template-rows: 1fr 3fr 2fr;
      }
      .parent > .child1,
      .child8 {
        background-color: chartreuse;
        color: black;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 30px;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1">GRID ITEM</div>
      <div class="child2"></div>
      <div class="child3"></div>
      <div class="child4"></div>
      <div class="child5"></div>
      <div class="child6"></div>
      <div class="child7"></div>
      <div class="child8">GRID ITEM</div>
    </div>
  </body>
</html>
