<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      .parent {
        width: 400px;
        height: 400px;
        border: 5px solid red;
        background-image: url("task.jpg");
        position: relative;
        /*
        display: flex;
        justify-content: center;
        align-items: center;
        */
      }

      .parent div {
        width: 30%;
        height: 15%;
        background-color: white;
        border: 2px solid black;
      }

      .child1 {
        position: absolute;
        bottom: 0px;
        right: 0px;
      }

      .child2 {
        position: absolute;
        bottom: 0px;
        left: 0px;
      }
      .child3 {
        position: absolute;
        top: 0px;
        left: 0px;
      }

      .child4 {
        position: absolute;
        top: 0px;
        right: 0px;
      }

      .child5 {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child1">bottom right</div>
      <div class="child2">Bottom left</div>
      <div class="child3">top left</div>
      <div class="child4">top right</div>
      <div class="child5">center</div>
    </div>
  </body>
</html>
