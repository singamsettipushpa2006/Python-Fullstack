<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <style>
      .parent {
        width: 200px;
        height: 100px;
        border: 5px solid black;
        box-sizing: border-box;
      }
      .parent > div {
        width: 200px;
        height: 100px;
        background-color: aqua;
        padding: 10px;
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="child"></div>
    </div>
  </body>
</html>
